{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <div style="font-size:6rem;line-height:1;" class="text-muted mb-2">404</div>
  <h3 class="fw-bold mb-2">Page Not Found</h3>
  <p class="text-muted mb-4" style="max-width:420px;">
    The page you're looking for doesn't exist, has been moved, or the URL is incorrect.
  </p>
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Go to Dashboard
    </a>
    <button onclick="history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Go Back
    </button>
  </div>
  <div class="mt-5">
    <small class="text-muted">Error code: 404 &mdash; Not Found</small>
  </div>
</div>
{% endblock %}
