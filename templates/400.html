{% extends "base.html" %}
{% block title %}Bad Request{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <div style="font-size:6rem;line-height:1;" class="text-muted mb-2">400</div>
  <h3 class="fw-bold mb-2">Bad Request</h3>
  <p class="text-muted mb-4" style="max-width:420px;">
    The server could not understand this request. This may be due to malformed syntax
    or an invalid request. Please try again.
  </p>
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Go to Dashboard
    </a>
    <button onclick="history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Go Back
    </button>
  </div>
  <div class="mt-5">
    <small class="text-muted">Error code: 400 &mdash; Bad Request</small>
  </div>
</div>
{% endblock %}
