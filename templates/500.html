<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error &mdash; PaperTrail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .error-code {
      font-size: 5.5rem;
      font-weight: 800;
      color: #dc2626;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .error-message {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.55rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1.5px solid transparent;
    }
    .btn-primary {
      background: #1a1a2e;
      color: #fff;
    }
    .btn-primary:hover { background: #16213e; }
    .footer-note {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 2rem;
    }
    .logo {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#128196; PaperTrail</div>
    <div class="error-code">500</div>
    <div class="error-title">Internal Server Error</div>
    <p class="error-message">
      Something went wrong on our end. Our team has been notified.
      Please try again in a few moments, or return to the home page.
    </p>
    <a href="/" class="btn btn-primary">Go to Home Page</a>
    <div class="footer-note">Error code: 500 &mdash; Internal Server Error</div>
  </div>
</body>
</html>
