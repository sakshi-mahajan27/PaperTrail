{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <div style="font-size:6rem;line-height:1;" class="text-warning mb-2">403</div>
  <h3 class="fw-bold mb-2">Access Denied</h3>
  <p class="text-muted mb-4" style="max-width:420px;">
    You don't have permission to access this page. If you believe this is a mistake,
    please contact your system administrator.
  </p>
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Go to Dashboard
    </a>
    <button onclick="history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Go Back
    </button>
  </div>
  <div class="mt-5">
    <small class="text-muted">Error code: 403 &mdash; Forbidden</small>
  </div>
</div>
{% endblock %}
