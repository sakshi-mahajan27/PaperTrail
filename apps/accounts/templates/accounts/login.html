{% extends "base.html" %}
{% load static %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<link href="{% static 'css/login.css' %}" rel="stylesheet">

<div class="login-container">
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <i class="bi bi-journal-check text-primary" style="font-size:2.5rem;"></i>
      <h4 class="fw-bold mt-2 mb-0">PaperTrail</h4>
      <small class="text-muted">NGO Financial Compliance System</small>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        {{ form.password }}
      </div>
      {% if form.non_field_errors %}
        <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
