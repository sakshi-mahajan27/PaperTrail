{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:#1a2a42;">
  <div class="card p-4" style="width:380px;">
    <div class="text-center mb-4">
      <i class="bi bi-journal-check text-primary" style="font-size:2.5rem;"></i>
      <h4 class="fw-bold mt-2 mb-0">PaperTrail</h4>
      <small class="text-muted">NGO Financial Compliance System</small>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        {{ form.password }}
      </div>
      {% if form.non_field_errors %}
        <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
